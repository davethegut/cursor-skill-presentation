<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  /* Optional: uncomment for polished typography. Remove for sensitive/internal content (leaks viewer IP to Google). */
  /* @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap'); */

  :root {
    --elastic-blue: #0B64DD;
    --elastic-dark: #101C3F;
    --elastic-purple: #731DCF;
    --elastic-teal: #00BFB3;
    --elastic-pink: #F04E98;
    --elastic-yellow: #FEC514;
    --bg-primary: #0a0e1a;
    --bg-surface: #111827;
    --bg-card: #1a2236;
    --text-primary: #f0f2f5;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --border: rgba(255,255,255,0.08);
    --gradient-hero: linear-gradient(135deg, #0B64DD 0%, #731DCF 100%);
    --gradient-accent: linear-gradient(135deg, #00BFB3 0%, #0B64DD 100%);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: var(--bg-primary); color: var(--text-primary); font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

  /* ── Deck engine ── */
  .deck { position: relative; width: 100%; height: 100%; }
  .slide {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    padding: 60px 80px;
    opacity: 0; visibility: hidden;
    transition: opacity 0.5s ease, transform 0.5s ease;
    transform: translateX(40px);
    overflow-y: auto;
  }
  .slide.active { opacity: 1; visibility: visible; transform: translateX(0); }
  .slide-inner { max-width: 1100px; width: 100%; }

  /* ── Progress bar ── */
  .progress-bar {
    position: fixed; top: 0; left: 0; height: 3px; z-index: 1000;
    background: var(--gradient-hero); transition: width 0.4s ease;
  }

  /* ── Navigation ── */
  .nav-controls {
    position: fixed; bottom: 30px; right: 40px; z-index: 100;
    display: flex; gap: 8px; align-items: center;
  }
  .nav-btn {
    width: 42px; height: 42px; border-radius: 10px;
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text-secondary); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; font-size: 16px;
  }
  .nav-btn:hover { background: var(--elastic-blue); color: white; border-color: var(--elastic-blue); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn:disabled:hover { background: var(--bg-card); color: var(--text-secondary); border-color: var(--border); }
  .slide-counter {
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px;
    color: var(--text-muted); padding: 0 10px;
  }
  .fullscreen-btn { position: fixed; bottom: 30px; left: 40px; z-index: 100; }
  .slide-number {
    position: fixed; bottom: 34px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; z-index: 100;
  }
  .slide-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-muted); opacity: 0.3;
    transition: all 0.3s; cursor: pointer;
  }
  .slide-dot.active { opacity: 1; background: var(--elastic-blue); width: 24px; border-radius: 4px; }

  /* ── Typography ── */
  h1 { font-size: 3rem; font-weight: 800; line-height: 1.1; letter-spacing: -0.03em; }
  h2 { font-size: 2.2rem; font-weight: 700; line-height: 1.2; letter-spacing: -0.02em; margin-bottom: 32px; }
  h3 { font-size: 1.3rem; font-weight: 600; line-height: 1.3; margin-bottom: 16px; }
  p { font-size: 1.1rem; line-height: 1.7; color: var(--text-secondary); }
  .lead { font-size: 1.35rem; line-height: 1.6; color: var(--text-secondary); }

  .gradient-text {
    background: var(--gradient-hero);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  /* ── Cards ── */
  .card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px;
  }
  .card-grid { display: grid; gap: 20px; }
  .card-grid-2 { grid-template-columns: 1fr 1fr; }
  .card-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
  .card-grid-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

  /* ── Stats ── */
  .stat-value { font-size: 3.5rem; font-weight: 900; line-height: 1; margin-bottom: 8px; }
  .stat-label { font-size: 0.95rem; color: var(--text-muted); line-height: 1.4; }
  .stat-small .stat-value { font-size: 2.4rem; }

  /* ── Tables ── */
  .data-table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
  .data-table th {
    text-align: left; padding: 12px 16px; color: var(--text-muted); font-weight: 500;
    border-bottom: 1px solid var(--border); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .data-table td { padding: 14px 16px; border-bottom: 1px solid var(--border); color: var(--text-secondary); }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table .highlight-cell { color: var(--text-primary); font-weight: 500; }

  /* ── Tags ── */
  .tag {
    display: inline-block; padding: 4px 10px; border-radius: 6px;
    font-size: 0.75rem; font-weight: 600;
  }
  .tag-blue { background: rgba(11,100,221,0.15); color: var(--elastic-blue); }
  .tag-teal { background: rgba(0,191,179,0.15); color: var(--elastic-teal); }
  .tag-pink { background: rgba(240,78,152,0.15); color: var(--elastic-pink); }
  .tag-purple { background: rgba(115,29,207,0.15); color: var(--elastic-purple); }
  .tag-yellow { background: rgba(254,197,20,0.15); color: var(--elastic-yellow); }

  /* ── Deck header (top-left branding) ── */
  .deck-header {
    position: fixed; top: 20px; left: 40px; z-index: 100;
    display: flex; align-items: center; gap: 12px;
  }
  .deck-header svg { opacity: 0.6; }
  .deck-header .divider { width: 1px; height: 20px; background: var(--border); }
  .deck-header .label { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; letter-spacing: 0.04em; }

  /* ── Pipeline / flow diagram ── */
  .pipeline {
    display: flex; align-items: center; gap: 0; width: 100%; margin: 32px 0;
  }
  .pipeline-step {
    flex: 1; padding: 20px 16px; text-align: center;
    background: var(--bg-card); border: 1px solid var(--border); position: relative;
  }
  .pipeline-step:first-child { border-radius: 12px 0 0 12px; }
  .pipeline-step:last-child { border-radius: 0 12px 12px 0; }
  .pipeline-arrow {
    width: 24px; height: 24px; flex-shrink: 0; color: var(--elastic-blue);
    font-size: 18px; display: flex; align-items: center; justify-content: center;
  }
  .pipeline-step .step-num { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 6px; }
  .pipeline-step .step-title { font-size: 0.85rem; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
  .pipeline-step .step-detail { font-size: 0.75rem; color: var(--text-muted); }

  /* ── Before/After comparison ── */
  .comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin: 24px 0; }
  .comparison-box { padding: 28px; border-radius: 16px; }
  .comparison-before { background: rgba(240,78,152,0.05); border: 1px solid rgba(240,78,152,0.2); }
  .comparison-after { background: rgba(0,191,179,0.05); border: 1px solid rgba(0,191,179,0.2); }
  .comparison-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; }
  .comparison-before .comparison-label { color: var(--elastic-pink); }
  .comparison-after .comparison-label { color: var(--elastic-teal); }
  .comparison-box ul { list-style: none; padding: 0; }
  .comparison-box li { padding: 6px 0; font-size: 0.95rem; color: var(--text-secondary); display: flex; align-items: flex-start; gap: 8px; }
  .comparison-before li::before { content: "\2715"; color: var(--elastic-pink); font-weight: 700; flex-shrink: 0; margin-top: 2px; }
  .comparison-after li::before { content: "\2713"; color: var(--elastic-teal); font-weight: 700; flex-shrink: 0; margin-top: 2px; }

  /* ── Linkable cards (ecosystem / feature grid) ── */
  .eco-card {
    padding: 20px; border-radius: 12px; background: var(--bg-card); border: 1px solid var(--border);
    transition: border-color 0.2s, transform 0.15s; cursor: pointer; text-decoration: none; display: block; color: inherit;
  }
  .eco-card:hover { border-color: var(--elastic-blue); transform: translateY(-2px); }
  .eco-card .eco-title { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
  .eco-card .eco-how { font-size: 0.8rem; color: var(--elastic-teal); font-weight: 500; margin-bottom: 6px; }
  .eco-card .eco-detail { font-size: 0.8rem; color: var(--text-muted); line-height: 1.5; }
  .eco-card .eco-tag { margin-bottom: 10px; }

  /* ── Quote cards ── */
  .quote-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px 24px; position: relative;
  }
  .quote-card::before {
    content: '\201C'; position: absolute; top: 8px; left: 16px;
    font-size: 2.5rem; color: var(--elastic-blue); opacity: 0.3; line-height: 1;
  }
  .quote-text { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; font-style: italic; padding-left: 24px; }
  .quote-source { font-size: 0.75rem; color: var(--text-muted); margin-top: 10px; padding-left: 24px; font-style: normal; }
  .quote-source strong { color: var(--text-primary); }

  /* ── Callouts ── */
  .callout {
    padding: 20px 24px; border-radius: 12px; margin-top: 20px;
  }
  .callout-blue { background: rgba(11,100,221,0.06); border: 1px solid rgba(11,100,221,0.15); }
  .callout-teal { background: rgba(0,191,179,0.06); border: 1px solid rgba(0,191,179,0.15); }
  .callout-pink { background: rgba(240,78,152,0.06); border: 1px solid rgba(240,78,152,0.15); }
  .callout-purple { background: rgba(115,29,207,0.06); border: 1px solid rgba(115,29,207,0.15); }
  .callout-yellow { background: rgba(254,197,20,0.06); border: 1px solid rgba(254,197,20,0.15); }
  .callout p { font-size: 0.95rem; margin: 0; }

  /* ── Source notes ── */
  .source-note {
    font-size: 0.75rem; color: var(--text-muted); font-style: italic;
    margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);
  }

  /* ── Two-column wrap-up ── */
  .wrap-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-top: 28px; }
  .wrap-left { border-left: 4px solid var(--elastic-pink); padding-left: 20px; }
  .wrap-right { border-left: 4px solid var(--elastic-teal); padding-left: 20px; }
  .wrap-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
  .wrap-left .wrap-label { color: var(--elastic-pink); }
  .wrap-right .wrap-label { color: var(--elastic-teal); }
  .wrap-list { list-style: none; padding: 0; }
  .wrap-list li { padding: 5px 0; font-size: 0.95rem; color: var(--text-secondary); }

  /* ── Timeline ── */
  .timeline { position: relative; padding-left: 28px; margin: 24px 0; }
  .timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: var(--border); }
  .timeline-item { position: relative; padding: 12px 0; }
  .timeline-item::before {
    content: ''; position: absolute; left: -24px; top: 18px;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--elastic-blue); border: 2px solid var(--bg-primary);
  }
  .timeline-item.done::before { background: var(--elastic-teal); }
  .timeline-item.future::before { background: var(--text-muted); }
  .timeline-date { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; }
  .timeline-title { font-size: 0.95rem; font-weight: 600; color: var(--text-primary); }
  .timeline-detail { font-size: 0.85rem; color: var(--text-muted); }

  /* ── Bullet list inside cards ── */
  .card-list { list-style: none; padding: 0; }
  .card-list li { padding: 6px 0; font-size: 0.9rem; color: var(--text-secondary); display: flex; align-items: flex-start; gap: 8px; }
  .card-list li::before { content: "\2022"; color: var(--elastic-blue); font-weight: 700; flex-shrink: 0; }

  /* ── Print ── */
  @media print {
    body { overflow: visible !important; background: white; color: #1a1a1a; }
    .deck { position: static; }
    .slide {
      position: static !important; opacity: 1 !important; visibility: visible !important;
      transform: none !important; page-break-after: always; min-height: 100vh; padding: 40px;
    }
    .nav-controls, .fullscreen-btn, .progress-bar, .slide-number, .deck-header { display: none !important; }
    .card { border: 1px solid #ddd; }
    .gradient-text { -webkit-text-fill-color: var(--elastic-blue); }
    h1, h2, h3, .stat-value { color: #1a1a1a; }
    p, .lead, td, li { color: #444; }
    .eco-card, .quote-card { background: #fafafa; border: 1px solid #ddd; }
    :root {
      --bg-card: #f5f5f5; --bg-surface: #fafafa; --text-primary: #1a1a1a;
      --text-secondary: #444; --text-muted: #888; --border: #ddd;
    }
  }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .slide { padding: 30px 24px; }
    h1 { font-size: 2rem; }
    h2 { font-size: 1.6rem; }
    .card-grid-2, .card-grid-3, .card-grid-4 { grid-template-columns: 1fr; }
    .comparison, .wrap-grid { grid-template-columns: 1fr; }
    .pipeline { flex-direction: column; }
    .pipeline-arrow { transform: rotate(90deg); }
    .pipeline-step:first-child, .pipeline-step:last-child { border-radius: 12px; }
    .stat-value { font-size: 2.5rem; }
    .nav-controls { bottom: 16px; right: 16px; }
    .fullscreen-btn { bottom: 16px; left: 16px; }
    .deck-header { top: 12px; left: 16px; }
  }
</style>
</head>
<body>

<div class="progress-bar" id="progressBar"></div>

<!-- Deck header: update the label to match the presentation topic -->

  <svg width="64" height="19" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M9.74 16.882l.711-.076.046 1.455c-1.879.257-3.485.393-4.818.393-1.773 0-3.03-.515-3.773-1.545C1.164 16.08.8 14.473.8 12.306c0-4.333 1.727-6.5 5.167-6.5 1.666 0 2.909.47 3.727 1.394.818.924 1.227 2.394 1.227 4.379l-.106 1.409H2.664c0 1.364.242 2.379.742 3.03.5.652 1.349.985 2.576.985 1.242.03 2.485-.015 3.757-.121zm-.667-5.349c0-1.515-.243-2.59-.728-3.212-.484-.621-1.272-.94-2.363-.94s-1.924.334-2.47.986c-.545.651-.833 1.712-.848 3.166h6.409zM13.497 18.427V.7h1.848v17.727h-1.848zM27.027 9.806v6.076c0 .621 1.53.742 1.53.742l-.09 1.637c-1.303 0-2.38.106-3.03-.515a10.861 10.861 0 01-4.44.924c-1.136 0-2-.319-2.59-.97-.592-.636-.895-1.56-.895-2.773 0-1.197.303-2.09.91-2.651.605-.56 1.56-.925 2.863-1.046l3.879-.363v-1.06c0-.834-.182-1.44-.546-1.804-.363-.364-.863-.545-1.485-.545H18.27V5.82h4.742c1.394 0 2.41.318 3.046.97.651.636.97 1.651.97 3.015zm-7.606 5.03c0 1.516.621 2.273 1.879 2.273a9.89 9.89 0 003.303-.56l.56-.197v-4.076l-3.65.348c-.743.06-1.274.273-1.607.637-.333.363-.485.894-.485 1.575zM34.255 7.473c-1.788 0-2.697.62-2.697 1.879 0 .575.212.984.62 1.227.41.242 1.35.485 2.819.742 1.47.258 2.5.606 3.106 1.076.606.454.91 1.318.91 2.59 0 1.274-.41 2.198-1.228 2.789-.818.59-2 .894-3.576.894-1.015 0-4.424-.38-4.424-.38l.106-1.605c1.954.182 3.379.333 4.333.333.955 0 1.682-.151 2.182-.454.5-.303.758-.819.758-1.53 0-.713-.212-1.198-.637-1.455-.424-.258-1.363-.5-2.818-.728-1.455-.227-2.485-.56-3.09-1.015-.607-.439-.91-1.272-.91-2.47 0-1.196.424-2.09 1.273-2.666.848-.576 1.909-.864 3.166-.864 1 0 4.485.258 4.485.258v1.621c-1.833-.106-3.333-.242-4.379-.242zM47.952 7.685h-3.925v5.909c0 1.409.106 2.348.303 2.788.212.44.697.666 1.47.666l2.197-.151.121 1.53c-1.106.182-1.94.273-2.515.273-1.288 0-2.167-.318-2.667-.94-.5-.62-.742-1.818-.742-3.575v-6.5h-1.758V6.079h1.758V2.29h1.833v3.773h3.925v1.62zM50.527 3.276V1.139h1.849v2.152l-1.849-.015zm0 15.151V6.08h1.849v12.348h-1.849zM60.406 5.821c.546 0 1.47.106 2.773.303l.59.076-.075 1.5c-1.318-.152-2.288-.227-2.91-.227-1.393 0   </svg>
  <div class="divider"></div>
  <span class="label">{{HEADER_LABEL}}</span>
</div>

<div class="slide-number" id="slideDots"></div>

<div class="fullscreen-btn">
  <button class="nav-btn" onclick="toggleFullscreen()" title="Fullscreen (F)">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M1 6V1h5M10 1h5v5M15 10v5h-5M6 15H1v-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</div>
<div class="nav-controls">
  <button class="nav-btn" id="prevBtn" onclick="prevSlide()" title="Previous">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 3L5 7l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <span class="slide-counter" id="slideCounter">1 / N</span>
  <button class="nav-btn" id="nextBtn" onclick="nextSlide()" title="Next">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>

    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3.5 5V1h7v4M3.5 10H2a1 1 0 01-1-1V6.5A1 1 0 012 5.5h10a1 1 0 011 1V9a1 1 0 01-1 1h-1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><rect x="3.5" y="8.5" width="7" height="4.5" rx="0.5" stroke="currentColor" stroke-width="1.2"/></svg>
  </button>
</div>

<div class="deck">

<!-- ============================================================ -->
<!-- SLIDES GO HERE                                                -->
<!-- Each slide: <div class="slide" data-slide="N">               -->
<!--   First slide also gets class "active"                        -->
<!-- ============================================================ -->

{{SLIDES}}

</div><!-- end .deck -->

<script>
  const slides = document.querySelectorAll('.slide');
  const totalSlides = slides.length;
  let current = 0;

  function updateUI() {
    slides.forEach((s, i) => {
      s.classList.remove('active', 'exit-left');
      if (i === current) s.classList.add('active');
    });
    document.getElementById('progressBar').style.width = ((current + 1) / totalSlides * 100) + '%';
    document.getElementById('slideCounter').textContent = (current + 1) + ' / ' + totalSlides;
    document.getElementById('prevBtn').disabled = current === 0;
    document.getElementById('nextBtn').disabled = current === totalSlides - 1;
    updateDots();
  }

  function updateDots() {
    const c = document.getElementById('slideDots');
    c.innerHTML = '';
    for (let i = 0; i < totalSlides; i++) {
      const d = document.createElement('div');
      d.className = 'slide-dot' + (i === current ? ' active' : '');
      d.onclick = () => goToSlide(i);
      c.appendChild(d);
    }
  }

  function goToSlide(n) {
    if (n < 0 || n >= totalSlides || n === current) return;
    current = n;
    updateUI();
  }
  function nextSlide() { goToSlide(current + 1); }
  function prevSlide() { goToSlide(current - 1); }

  function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
  function printDeck() { window.print(); }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
    if (e.key === 'ArrowDown') { e.preventDefault(); nextSlide(); }
    if (e.key === 'ArrowUp') { e.preventDefault(); prevSlide(); }
    if (e.key === 'Home') { e.preventDefault(); goToSlide(0); }
    if (e.key === 'End') { e.preventDefault(); goToSlide(totalSlides - 1); }
    if (e.key === 'f' || e.key === 'F') { toggleFullscreen(); }
    if (e.key === 'p' || e.key === 'P') { printDeck(); }
  });

  let touchStartX = 0, touchStartY = 0;
  document.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
  }, { passive: true });
  document.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].screenX - touchStartX;
    const dy = e.changedTouches[0].screenY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
      if (dx < 0) nextSlide(); else prevSlide();
    }
  }, { passive: true });

  let wheelTimeout = null;
  document.addEventListener('wheel', (e) => {
    if (wheelTimeout) return;
    wheelTimeout = setTimeout(() => { wheelTimeout = null; }, 400);
    if (e.deltaY > 0 || e.deltaX > 0) nextSlide();
    else if (e.deltaY < 0 || e.deltaX < 0) prevSlide();
  }, { passive: true });

  updateUI();
</script>
</body>
</html>
